<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo.png">
<title>Waitlist Admin — KaviNote</title>
<style>
:root {
  --paper: #FAF8F3; --ink: #1C2321; --river: #2E6E65; --mist: #DCE4E0;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
* { margin: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; padding: 24px 16px 64px; }
.wrap { max-width: 720px; margin: 0 auto; }
.mark { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 19px; color: var(--ink); text-decoration: none; }
.mark img { width: 44px; height: 44px; border-radius: 12px; }
h1 { font-family: var(--serif); font-weight: 500; font-size: 32px; margin: 28px 0 6px; letter-spacing: -0.01em; }
.meta { font-family: var(--mono); font-size: 12.5px; opacity: .55; letter-spacing: .06em; }
.card { background: #fff; border: 1px solid var(--mist); border-radius: 16px; padding: 24px; margin-top: 24px; }
input { width: 100%; padding: 14px 16px; font-size: 16px; border: 1.5px solid var(--mist); border-radius: 12px; font-family: var(--sans); }
input:focus { outline: none; border-color: var(--river); box-shadow: 0 0 0 3px rgba(46,110,101,.1); }
.btn { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; background: var(--river); color: #fff; padding: 12px 22px; border-radius: 12px; font-weight: 600; font-size: 15px; border: none; cursor: pointer; font-family: var(--sans); }
.btn.ghost { background: transparent; color: var(--river); border: 1.5px solid var(--river); }
.btn.block { width: 100%; margin-top: 12px; }
.err { color: #B4423A; font-size: 14px; margin-top: 12px; min-height: 20px; }
.stat { font-family: var(--serif); font-size: 56px; font-weight: 600; color: var(--river); line-height: 1; }
.stat-label { font-size: 15px; opacity: .7; margin-top: 6px; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14.5px; }
th { text-align: left; font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; opacity: .5; padding: 8px 10px; border-bottom: 1.5px solid var(--mist); }
td { padding: 10px; border-bottom: 1px solid var(--mist); word-break: break-all; }
td.num { font-family: var(--mono); font-size: 12.5px; opacity: .5; width: 40px; }
td.date { font-family: var(--mono); font-size: 12.5px; opacity: .65; white-space: nowrap; }
.empty { text-align: center; opacity: .6; padding: 32px 0; }
</style>
</head>
<body>
<div class="wrap">
  <a class="mark" href="index.html">
    <img src="logo.png" alt="KaviNote">
    KaviNote
  </a>
  <h1>Waitlist Admin</h1>
  <p class="meta">Private dashboard — requires admin key</p>

  <!-- Sign in -->
  <div class="card" id="login">
    <label for="adminKey" style="display:block; font-weight:600; margin-bottom:10px;">Admin key</label>
    <input type="password" id="adminKey" placeholder="Enter your admin key" autocomplete="current-password">
    <button class="btn block" onclick="signIn()">View waitlist</button>
    <p class="err" id="loginErr"></p>
  </div>

  <!-- Dashboard -->
  <div id="panel" style="display:none;">
    <div class="card" style="text-align:center;">
      <div class="stat" id="count">–</div>
      <div class="stat-label">people on the waitlist</div>
    </div>
    <div class="toolbar">
      <button class="btn ghost" onclick="refresh()">↻ Refresh</button>
      <button class="btn ghost" onclick="exportCsv()">⬇ Export CSV</button>
      <button class="btn ghost" onclick="signOut()" style="margin-left:auto;">Sign out</button>
    </div>
    <div class="card" style="padding: 8px 16px 16px;">
      <table>
        <thead><tr><th>#</th><th>Email</th><th>Joined</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">No signups yet. Share the site! 🌱</div>
    </div>
  </div>
</div>

<script>
var KEY_STORE = 'kavinote_admin_key';
var lastEntries = [];

function fmtDate(ms) {
  if (!ms) return '—';
  var d = new Date(ms);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
         ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function render(data) {
  lastEntries = data.entries || [];
  document.getElementById('count').textContent = data.count;
  var rows = document.getElementById('rows');
  rows.innerHTML = '';
  lastEntries.forEach(function(e, i) {
    var tr = document.createElement('tr');
    var n = document.createElement('td'); n.className = 'num'; n.textContent = i + 1;
    var em = document.createElement('td'); em.textContent = e.email;
    var dt = document.createElement('td'); dt.className = 'date'; dt.textContent = fmtDate(e.joined);
    tr.appendChild(n); tr.appendChild(em); tr.appendChild(dt);
    rows.appendChild(tr);
  });
  document.getElementById('empty').style.display = lastEntries.length ? 'none' : 'block';
  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
}

function load(key, onFail) {
  fetch('/api/waitlist', { headers: { 'X-Admin-Key': key } })
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(res) {
      if (res.status === 200 && res.data.success) {
        sessionStorage.setItem(KEY_STORE, key);
        render(res.data);
      } else if (res.status === 401) {
        onFail('Wrong admin key.');
      } else if (res.status === 503) {
        onFail('Storage is not configured on the server yet.');
      } else {
        onFail('Something went wrong (' + res.status + ').');
      }
    })
    .catch(function() { onFail('Network error — try again.'); });
}

function signIn() {
  var key = document.getElementById('adminKey').value.trim();
  var errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!key) { errEl.textContent = 'Enter your admin key.'; return; }
  load(key, function(msg) { errEl.textContent = msg; });
}

function refresh() {
  var key = sessionStorage.getItem(KEY_STORE);
  if (!key) return signOut();
  load(key, function(msg) { alert(msg); });
}

function signOut() {
  sessionStorage.removeItem(KEY_STORE);
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login').style.display = 'block';
  document.getElementById('adminKey').value = '';
}

function exportCsv() {
  var lines = ['email,joined'];
  lastEntries.forEach(function(e) {
    lines.push('"' + e.email.replace(/"/g, '""') + '","' + (e.joined ? new Date(e.joined).toISOString() : '') + '"');
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kavinote-waitlist.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('adminKey').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') signIn();
});

window.addEventListener('DOMContentLoaded', function() {
  var key = sessionStorage.getItem(KEY_STORE);
  if (key) load(key, function() { signOut(); });
});
</script>
</body>
</html>
